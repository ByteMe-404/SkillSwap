{% extends 'base.html' %}
{% block title %}Create account — SkillSwap{% endblock %}
{% block content %}

<div style="max-width:640px;margin:40px auto;padding:0 16px;">
  <div class="ss-card" style="padding:32px;">
    <h2 style="font-size:24px;font-weight:700;margin:0 0 4px;">Create your account</h2>
    <p style="color:var(--text-mid);margin:0 0 28px;font-size:14px;">Join thousands of students exchanging skills</p>

    <form method="POST">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="ss-input-group">
          <label class="ss-label">First Name *</label>
          <input type="text" name="first_name" class="ss-input" placeholder="Enter your first name" required/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Last Name *</label>
          <input type="text" name="last_name" class="ss-input" placeholder="Enter your last name" required/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Gender</label>
          <select name="gender" class="ss-select">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Prefer not to say</option>
          </select>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Date of Birth</label>
          <input type="date" name="dob" class="ss-input"/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Phone Number</label>
          <input type="tel" name="phone" class="ss-input" placeholder="Enter your phone number"/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Email Address *</label>
          <input type="email" name="email" class="ss-input" placeholder="Enter your email address" required/>
        </div>
      </div>

      <div class="ss-input-group">
        <label class="ss-label">University Name *</label>
        <select name="university" class="ss-select" required>
          <option value="">Select your University</option>
          <option>Shanto-Mariam University of Creative Technology</option>
          <option>BRAC University</option>
          <option>North South University</option>
          <option>BUET</option>
          <option>Dhaka University</option>
          <option>Independent University Bangladesh</option>
          <option>East West University</option>
          <option>Other</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="ss-input-group">
          <label class="ss-label">Department *</label>
          <input type="text" name="department" class="ss-input" placeholder="Enter your department name" required/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Year *</label>
          <input type="number" name="year_of_study" class="ss-input" placeholder="Enter your studying year" min="1" max="7" required/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Password *</label>
          <input type="password" name="password" class="ss-input" placeholder="Enter your Password" required/>
        </div>
        <div class="ss-input-group">
          <label class="ss-label">Confirm Password *</label>
          <input type="password" name="confirm_password" class="ss-input" placeholder="Re - enter your password" required/>
        </div>
      </div>

      <button type="submit" class="btn-ss btn-ss-primary btn-ss-block" style="padding:12px;font-size:15px;margin-top:8px;">Register</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-mid);">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--primary);font-weight:600;text-decoration:none;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
